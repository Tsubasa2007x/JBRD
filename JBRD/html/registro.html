<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>JBRD Coin - Registro</title>

    <link rel="stylesheet" href="../css/estilos.css" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="card">

    <h2>Registro de Usuario</h2>

    <!-- 🔥 CONEXIÓN CON PHP -->
    <form method="POST" action="../php/JBRD.php">

        <input type="text" name="usuario" placeholder="Usuario" required>

        <div class="password-box">
            <input type="password" name="contrasena" placeholder="Contraseña" required>
            <span onclick="this.previousElementSibling.type =
                this.previousElementSibling.type === 'password' ? 'text' : 'password'">
                👁
            </span>
        </div>

        <small>
            Mínimo 6 caracteres, 1 mayúscula, solo letras y números
        </small>

        <button type="submit" name="Registrar">
            Crear cuenta
        </button>

    </form>

    <a href="login.html" class="link">Volver al login</a>

</div>

</body>
</html>
