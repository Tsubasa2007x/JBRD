<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro JBRD</title>

    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../js/app.js" defer></script>
</head>

<body>

<div class="box-reg1">
    <h2>Datos del usuario</h2>

    <div id="preguntas">
        <input type="text" id="regnom" placeholder="Nombres">
        <input type="text" id="regap" placeholder="Apellidos">

        <select id="tipoid">
            <option value="">Tipo de documento</option>
            <option value="CC">CC</option>
            <option value="CE">CE</option>
            <option value="TI">TI</option>
            <option value="NIT">NIT</option>
            <option value="PAS">PAS</option>
        </select>

        <input type="text" id="doc" placeholder="Documento">

        <input type="text" id="fechanac" placeholder="Fecha de nacimiento"
        onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">

        <input type="text" id="fechaexp" placeholder="Fecha de expedición"
        onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">

        <small id="errorFecha" style="color:rgb(255, 255, 255); display:none;">
            Fecha de expedicion invalida
        </small>

        <input type="text" id="correo" placeholder="Correo electrónico">
        <input type="text" id="contacto" placeholder="Número de contacto">
    </div>

    <button onclick="registrar1()">Ir a registro</button>

</div>

</body>
</html>
